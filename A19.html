<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroceryAI - Kontrola</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #00d4ff;
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        .header-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .header-panel h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        .stats-row {
            font-size: 14px;
            margin-top: 8px;
        }

        .floating-avatar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 120px;
            height: 120px;
            z-index: 9999;
            cursor: move;
            touch-action: none;
            user-select: none;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6));
        }

        .floating-avatar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .product-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 180px;
            text-align: center;
        }

        .product-circle-bg {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 75px;
            height: 75px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.25) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: 1;
        }

        .product-image {
            width: 85%;
            height: auto;
            max-height: 100px;
            object-fit: contain;
            z-index: 2;
            filter: drop-shadow(0px 8px 12px rgba(0, 0, 0, 0.5));
            transition: transform 0.2s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.1) translateY(-4px);
        }

        .product-info {
            z-index: 2;
            margin-top: auto;
        }

        .product-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .product-price {
            font-size: 13px;
            color: var(--accent-blue);
            font-weight: bold;
        }

        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            height: 70px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10000;
        }

        .mic-btn-container {
            position: relative;
            top: -20px;
        }

        .mic-btn {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #00d4ff 0%, #0056ff 100%);
            border-radius: 50%;
            border: none;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mic-btn svg {
            width: 28px;
            height: 28px;
            fill: #fff;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header-panel">
            <h1>Zdravo, Saša!</h1>
            <div class="stats-row" id="broj-artikala-skraceno">0 art. | 0 RSD</div>
            <div class="stats-row">BUDŽET: <span id="trenutni-budzet">0</span> / 30000 RSD</div>
        </div>

        <div id="avatar-container" class="floating-avatar">
            <img src="avatar.png" alt="AI Asistent">
        </div>

        <div class="products-grid" id="mreza-proizvoda">
            </div>

    </div>

    <div class="nav-bar">
        <div>🏠</div>
        <div>🔍</div>
        <div class="mic-btn-container">
            <button class="mic-btn" onclick="aktivirajGlasovnuKomandu()">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
            </button>
        </div>
        <div>🛒</div>
        <div>👤</div>
    </div>

    <script>
        // Baza Proizvoda
        const bazaProizvoda = [
            { id: "brasno", naziv: "Brašno", cena: 85, jedinica: "kg", slika: "brasno.png" },
            { id: "mleko", naziv: "Mleko", cena: 98, jedinica: "L", slika: "mleko.png" },
            { id: "banane", naziv: "Banane", cena: 95, jedinica: "kg", slika: "banane.png" },
            { id: "secer", naziv: "Šećer", cena: 95, jedinica: "kg", slika: "secer.png" },
            { id: "keks", naziv: "Keks", cena: 89, jedinica: "kom", slika: "keks.png" },
            { id: "jaja", naziv: "Jaja", cena: 20, jedinica: "kom", slika: "jaja.png" },
            { id: "krompir", naziv: "Krompir", cena: 60, jedinica: "kg", slika: "krompir.png" },
            { id: "maslac", naziv: "Maslac (Buter)", cena: 350, jedinica: "kom", slika: "maslac.png" },
            { id: "feta", naziv: "Feta sir", cena: 420, jedinica: "kom", slika: "feta.png" }
        ];

        let korpa = [];

        // Inicijalizacija prikaza na ekranu
        function renderujProizvode() {
            const grid = document.getElementById('mreza-proizvoda');
            grid.innerHTML = bazaProizvoda.map(p => `
                <div class="product-card" onclick="dodajUFormatiranuKorpu('${p.id}', 1)">
                    <div class="product-circle-bg"></div>
                    <img src="${p.slika}" class="product-image" onerror="this.src='https://via.placeholder.com/100?text=${p.naziv}'">
                    <div class="product-info">
                        <div class="product-title">${p.naziv}</div>
                        <div class="product-price">${p.cena} RSD / ${p.jedinica}</div>
                    </div>
                </div>
            `).join('');
        }

        // Drag & Drop za Avatara
        const avatar = document.getElementById('avatar-container');
        let isDragging = false;
        let startX, startY;

        avatar.addEventListener('touchstart', (e) => {
            isDragging = true;
            const touch = e.touches[0];
            startX = touch.clientX - avatar.offsetLeft;
            startY = touch.clientY - avatar.offsetTop;
        });

        avatar.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const touch = e.touches[0];
            let newX = touch.clientX - startX;
            let newY = touch.clientY - startY;

            newX = Math.max(0, Math.min(newX, window.innerWidth - avatar.offsetWidth));
            newY = Math.max(0, Math.min(newY, window.innerHeight - avatar.offsetHeight));

            avatar.style.left = `${newX}px`;
            avatar.style.top = `${newY}px`;
        });

        avatar.addEventListener('touchend', () => { isDragging = false; });

        // Upravljanje korpom i količinama
        function dodajUFormatiranuKorpu(proizvodId, kolicina) {
            const proizvod = bazaProizvoda.find(p => p.id === proizvodId);
            if (!proizvod) return;

            const postojeci = korpa.find(item => item.proizvod.id === proizvodId);

            if (postojeci) {
                postojeci.kolicina += kolicina;
                postojeci.ukupnaCena = postojeci.kolicina * proizvod.cena;
            } else {
                korpa.push({
                    proizvod: proizvod,
                    kolicina: kolicina,
                    ukupnaCena: kolicina * proizvod.cena
                });
            }
            osveziPrikazKorpe();
        }

        function osveziPrikazKorpe() {
            let ukupnoRSD = 0;
            let ukupnoArtikala = 0;

            korpa.forEach(item => {
                ukupnoRSD += item.ukupnaCena;
                ukupnoArtikala += item.kolicina;
            });

            document.getElementById('broj-artikala-skraceno').innerText = `${korpa.length} art. u listi | Ukupno: ${ukupnoArtikala} kom/kg`;
            document.getElementById('trenutni-budzet').innerText = `${ukupnoRSD}`;
        }

        // AI Sekretarica - Prepoznavanje glasa i tačne količine
        function procesuirajGlasovnuKomandu(tekstKomande) {
            const ociscenTekst = tekstKomande.toLowerCase().trim();
            let kolicina = 1;

            // RegEx traži broj na početku ili pre reči
            const pronadjenBroj = ociscenTekst.match(/(\d+)\s*(kg|l|kom|g)?/);
            if (pronadjenBroj) {
                kolicina = parseInt(pronadjenBroj[1], 10);
            }

            let detektovanProizvod = null;
            for (let proizvod of bazaProizvoda) {
                if (ociscenTekst.includes(proizvod.id) || ociscenTekst.includes(proizvod.naziv.toLowerCase())) {
                    detektovanProizvod = proizvod;
                    break;
                }
            }

            if (detektovanProizvod) {
                dodajUFormatiranuKorpu(detektovanProizvod.id, kolicina);
                alert(`Sekretarica: Dodato ${kolicina}x ${detektovanProizvod.naziv}`);
            } else {
                alert("Sekretarica: Nisam razumela koji proizvod želite.");
            }
        }

        function aktivirajGlasovnuKomandu() {
            // Simulacija unosa za testiranje (Zameni sa Web Speech API na telefonu)
            const testUnos = prompt("Izgovori komandu (npr. '5 kg brasna' ili '2 mleka'):");
            if (testUnos) {
                procesuirajGlasovnuKomandu(testUnos);
            }
        }

        // Pokretanje
        window.onload = renderujProizvode;
    </script>
</body>
</html>
